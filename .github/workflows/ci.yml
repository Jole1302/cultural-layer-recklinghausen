name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  vitest:
    runs-on: ubuntu-24.04
    env:
      # Dummy values that satisfy src/lib/env.ts Zod schema at module-load time.
      # Real values are not needed for unit tests; integration tests that hit a
      # real DB use testcontainers (Docker) and override DATABASE_URL at runtime.
      DATABASE_URL: postgres://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: ci-test-secret-must-be-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_test_dummy_key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # ubuntu-24.04 runner has Docker preinstalled (testcontainers needs it)
      - run: pnpm test:unit -- --coverage

  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
